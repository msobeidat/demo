<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Test Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #2c3e50; margin-bottom: 1.5rem; text-align: center; }
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        input { width: 45%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 6px; background-color: #e9ecef; text-align: center; font-weight: bold; }
        .test-cases { margin-top: 20px; font-size: 12px; color: #666; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Lab Calculator 🧪</h2>
        <form method="POST">
            <div class="input-group">
                <input type="number" name="num1" value="{{ num1 }}" placeholder="Num 1" required>
                <span>+</span>
                <input type="number" name="num2" value="{{ num2 }}" placeholder="Num 2" required>
            </div>
            <button type="submit">Run Test (Calculate)</button>
        </form>

        {% if result != "" %}
        <div class="result-box">
            Status: ✅ Success<br>
            Result: {{ result }}
        </div>
        {% endif %}

        <div class="test-cases">
            <strong>Quick Test Cases:</strong>
            <ul>
                <li>Add 5 + 5 (Expect 10)</li>
                <li>Add -1 + 1 (Expect 0)</li>
                <li>Add 1000 + 2000 (Expect 3000)</li>
            </ul>
        </div>
    </div>

</body>
</html>
